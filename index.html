<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاعل القطة - Meow Game</title>

    <link rel="icon" type="image/png" href="https://veguto.rawme.online/icon_meow.png">

    <meta property="og:title" content="تفاعل القطة - Meow Game">
    <meta property="og:description" content="meow!.">
    <meta property="og:image" content="https://veguto.rawme.online/banner_meow.png">
    <meta property="og:url" content="https://veguto.rawme.online/">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="تفاعل القطة - Meow Game">
    <meta name="twitter:description" content="لعبة بسيطة وممتعة لمحبي القطط!">
    <meta name="twitter:image" content="https://veguto.rawme.online/banner_meow.png">

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* العداد في الأعلى باللون الأحمر */
        #score {
            font-size: 3rem;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 20px;
            user-select: none;
        }

        .container {
            position: relative;
        }

        #clickable-img {
            width: 250px;
            cursor: pointer;
            transition: transform 0.1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }

        #clickable-img:active {
            transform: scale(0.9);
        }

        .plus-one {
            position: absolute;
            color: #ff4757;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <span id="score">0</span>

    <div class="container" id="game-container">
        <img src="meow.png" alt="Meow" id="clickable-img">
        <audio id="meow-sound" src="meow.mp3"></audio>
    </div>

    <script>
        const img = document.getElementById('clickable-img');
        const sound = document.getElementById('meow-sound');
        const container = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score');

        // استرجاع القيمة المخزنة من المتصفح
        let score = parseInt(localStorage.getItem('cat_clicks')) || 0;
        scoreDisplay.innerText = score;

        img.addEventListener('click', (e) => {
            sound.currentTime = 0;
            sound.play();

            // تحديث الرقم
            score++;
            scoreDisplay.innerText = score;
            localStorage.setItem('cat_clicks', score);

            // تأثير الـ +1 عند مكان الضغط
            const plusOne = document.createElement('div');
            plusOne.innerText = '+1';
            plusOne.className = 'plus-one';

            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            plusOne.style.left = `${x}px`;
            plusOne.style.top = `${y}px`;

            container.appendChild(plusOne);

            setTimeout(() => {
                plusOne.remove();
            }, 800);
        });
    </script>

</body>
</html>
