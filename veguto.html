<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veguto - Dynamic Cats & Apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --background: hsl(0 0% 96%);
  --foreground: hsl(0 0% 45%);
  --card: hsl(0 0% 100%);
  --primary: hsl(0 78% 75%);
  --primary-fg: hsl(0 0% 100%);
  --muted-fg: hsl(0 0% 60%);
  --border: hsl(0 0% 88%);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--background); color: var(--foreground); font-family: 'Quicksand', sans-serif; overflow-x: hidden; }
h1,h2,h3 { font-family: 'Dancing Script', cursive; }

/* Header & Hero */
header { width:100%; padding:1.5rem 1rem; text-align: center; }
header nav { display:flex; align-items:center; justify-content:center; gap:1rem; color:var(--muted-fg); }
.logo { width:3.5rem; height:3.5rem; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; margin:0 1rem; }
.logo span { color:white; font-family:'Dancing Script'; font-size:1.25rem; font-weight:700; }
header a { text-decoration:none; color:inherit; font-size: 0.9rem; }
.hero { text-align:center; padding:3rem 1rem; }
.hero h1 { font-size:3rem; }
.hero p { color: var(--muted-fg); margin-top: 0.5rem; }

.section-divider { width:100%; display:flex; align-items:center; justify-content:center; gap:1rem; margin:2rem 0; }
.section-divider::before, .section-divider::after { content:''; flex:1; height:1px; background:var(--border); }
.section-divider span { font-family:'Dancing Script'; font-size:1.8rem; padding:0 1rem; }

/* --- Interactive Apps (Grid 2x2 with Pagination) --- */
.apps-section { max-width: 900px; margin: 0 auto; padding: 0 1rem; }
.controls-top { display: flex; justify-content: center; align-items: center; gap: 1.5rem; margin-bottom: 2rem; }
.page-indicator { font-weight: 600; font-size: 1.1rem; min-width: 80px; text-align: center; }

.nav-btn {
    background: var(--card); border: 1px solid var(--border); border-radius: 50%;
    width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: 0.3s;
}
.nav-btn:hover:not(:disabled) { background: var(--primary); }
.nav-btn:hover:not(:disabled) svg { stroke: white; }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.apps-grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }

/* Article Section (Carousel) */
.carousel-section { padding:2rem 1rem; position: relative; max-width: 1200px; margin: 0 auto; }
.carousel-container { display: flex; align-items: center; gap: 10px; position: relative; }
.carousel-wrapper { overflow: hidden; width: 100%; }
.carousel-grid { display: flex; gap: 1.5rem; transition: transform 0.4s ease-in-out; padding: 1rem 5px; }

/* Card Styles */
.card-item { 
    background: var(--card); border-radius: 1rem; border: 1px solid var(--border); 
    padding: 1.5rem; transition: 0.3s; text-align: center;
}
.app-card { background: linear-gradient(135deg, hsla(0,78%,75%,.15), hsla(0,78%,75%,.05)); }
.article-card { flex: 0 0 calc(33.333% - 1rem); min-width: 280px; text-align: left; }
.card-item:hover { transform: translateY(-5px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }

.app-icon { width: 3.5rem; height: 3.5rem; background: white; margin: 0 auto 1.25rem; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid var(--border); }
.btn { display: inline-block; background: var(--primary); color: white; padding: 0.6rem 1.5rem; border-radius: 25px; text-decoration: none; margin-top: 1rem; font-weight: 600; font-size: 0.9rem; }
.icon { width:1.5rem; height:1.5rem; stroke:var(--primary); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

/* Loading State */
.loading { text-align: center; padding: 2rem; font-style: italic; color: var(--muted-fg); }

@media(max-width: 768px) { .apps-grid-container { grid-template-columns: 1fr; } .article-card { flex: 0 0 100%; } }
</style>
</head>
<body>

<header>
  <nav>
    <a href="#apps">Apps</a>
    <div class="logo"><span>VG</span></div>
    <a href="#articles">Articles</a>
  </nav>
</header>

<section class="hero">
  <h1>Veguto</h1>
  <p>Exploring Cats through Design & Tech</p>
</section>

<div class="section-divider"><span>Interactive Apps</span></div>
<section id="apps" class="apps-section">
    <div class="controls-top">
        <button class="nav-btn" id="prevAppBtn" onclick="changeAppPage(-1)">
            <svg class="icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="page-indicator" id="appPageNum">1 / 1</div>
        <button class="nav-btn" id="nextAppBtn" onclick="changeAppPage(1)">
            <svg class="icon" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>
    <div class="apps-grid-container" id="appsGrid">
        <p class="loading">Loading Apps...</p>
    </div>
</section>

<div class="section-divider"><span>Cat Articles 🐱</span></div>
<section id="articles" class="carousel-section">
  <div class="carousel-container">
    <button class="nav-btn" onclick="moveSlide('articlesGrid', -1)">
      <svg class="icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="carousel-wrapper">
      <div class="carousel-grid" id="articlesGrid">
        <p class="loading">Loading Articles...</p>
      </div>
    </div>
    <button class="nav-btn" onclick="moveSlide('articlesGrid', 1)">
      <svg class="icon" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</section>

<footer><p>© 2024 Veguto. Built with GitHub API.</p></footer>

<script>
const GITHUB_API_BASE = "https://api.github.com/repos/rawme2223/Veguto/contents/";

// --- جلب البيانات من GitHub ---
async function fetchFolderData(folderPath) {
    try {
        const response = await fetch(GITHUB_API_BASE + folderPath);
        const folders = await response.json();
        
        // جلب تفاصيل كل مجلد (ملف index.html)
        const detailedData = await Promise.all(folders.filter(f => f.type === 'dir').map(async (dir) => {
            const htmlRes = await fetch(GITHUB_API_BASE + folderPath + dir.name + "/index.html");
            const htmlData = await htmlRes.json();
            const content = atob(htmlData.content); // فك تشفير Base64

            // استخراج العنوان والوصف والأيقونة من الكود
            const parser = new DOMParser();
            const doc = parser.parseFromString(content, 'text/html');
            const title = doc.querySelector('title')?.innerText || dir.name;
            const description = doc.querySelector('meta[name="description"]')?.getAttribute('content') || "No description available.";
            
            // استخراج الأيقونة (يبحث عن أي وسم يحتوي على كود SVG أو أيقونة)
            const iconHtml = doc.querySelector('.app-icon')?.innerHTML || `<svg class="icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>`;

            return { title, description, iconHtml, link: dir.html_url };
        }));
        return detailedData;
    } catch (e) { console.error("Error fetching GitHub data:", e); return []; }
}

// --- إدارة قسم التطبيقات (Pagination) ---
let appList = [];
let currentAppPage = 1;
const appsPerPage = 4;

async function loadApps() {
    appList = await fetchFolderData("interactive games operations/");
    renderApps();
}

function renderApps() {
    const grid = document.getElementById('appsGrid');
    grid.innerHTML = "";
    
    const start = (currentAppPage - 1) * appsPerPage;
    const paginatedItems = appList.slice(start, start + appsPerPage);

    paginatedItems.forEach(app => {
        grid.innerHTML += `
            <div class="card-item app-card active">
                <div class="app-icon">${app.iconHtml}</div>
                <h3>${app.title}</h3>
                <p>${app.description}</p>
                <a href="${app.link}" class="btn" target="_blank">Launch App</a>
            </div>
        `;
    });

    const totalPages = Math.ceil(appList.length / appsPerPage) || 1;
    document.getElementById('appPageNum').innerText = `${currentAppPage} / ${totalPages}`;
    document.getElementById('prevAppBtn').disabled = currentAppPage === 1;
    document.getElementById('nextAppBtn').disabled = currentAppPage === totalPages;
}

function changeAppPage(dir) {
    currentAppPage += dir;
    renderApps();
}

// --- إدارة قسم المقالات (Carousel) ---
async function loadArticles() {
    const articles = await fetchFolderData("Cat Articles/"); // تأكد من اسم المجلد في مستودعك
    const grid = document.getElementById('articlesGrid');
    grid.innerHTML = "";
    
    articles.forEach(art => {
        grid.innerHTML += `
            <article class="card-item article-card">
                <div class="article-body">
                    <span class="date">Article</span>
                    <h3>${art.title}</h3>
                    <p>${art.description}</p>
                    <a href="${art.link}" class="read-more" target="_blank">Read more →</a>
                </div>
            </article>
        `;
    });
}

// --- Carousel Logic ---
let articleOffset = 0;
function moveSlide(id, dir) {
    const grid = document.getElementById(id);
    const cardWidth = grid.querySelector('.card-item').offsetWidth + 24;
    articleOffset += (dir * cardWidth);
    const max = grid.scrollWidth - grid.offsetWidth;
    if (articleOffset < 0) articleOffset = 0;
    if (articleOffset > max) articleOffset = max;
    grid.style.transform = `translateX(-${articleOffset}px)`;
}

// تشغيل عند التحميل
window.onload = () => {
    loadApps();
    loadArticles();
};
</script>
</body>
</html>
