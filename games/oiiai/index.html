<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OIIAOIIA-CAT</title>
    <meta name="description" content="OIIAOIIA but in website 
Enjoy the interactive OiiaOiia Cat game! Click to play the spinning cat ">
<link rel="icon" type="image/x-icon" href="/games/oiiai/icon.png">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #FCFCFC; /* خلفية بيضاء نظيفة */
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        img {
            position: absolute;
            height: 70%; /* يمكنك التحكم في الحجم من هنا */
            width: auto;
            display: none; /* إخفاء الصور */
            pointer-events: none;
        }

        .active {
            display: block; /* إظهار الصورة النشطة فقط */
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameBoard">
        <img id="catImg" src="/games/oiiai/cat.gif" class="active">
        <img id="gif1" src="/games/oiiai/o i i a i 1.gif">
        <img id="gif2" src="/games/oiiai/o i i a i 2.gif">
    </div>

    <audio id="s1" src="/games/oiiai/o i i a i 1.mp3" loop preload="auto"></audio>
    <audio id="s2" src="/games/oiiai/o i i a i 2.mp3" loop preload="auto"></audio>

    <script>
        const cat = document.getElementById('catImg');
        const g1 = document.getElementById('gif1');
        const g2 = document.getElementById('gif2');
        const s1 = document.getElementById('s1');
        const s2 = document.getElementById('s2');

        let currentMode = 1;
        let isActive = false;

        function startAction() {
            if (isActive) return;
            isActive = true;

            cat.classList.remove('active');

            if (currentMode === 1) {
                g1.classList.add('active');
                // لإعادة تشغيل الـ GIF من البداية عند كل ضغطة
                g1.src = g1.src; 
                s1.play();
            } else {
                g2.classList.add('active');
                g2.src = g2.src;
                s2.play();
            }
        }

        function stopAction() {
            if (!isActive) return;
            isActive = false;

            g1.classList.remove('active');
            g2.classList.remove('active');
            s1.pause();
            s2.pause();
            s1.currentTime = 0;
            s2.currentTime = 0;

            cat.classList.add('active');
            
            // تبديل الدور للضغطة القادمة
            currentMode = currentMode === 1 ? 2 : 1;
        }

        // أحداث اللمس والماوس
        const board = document.getElementById('gameBoard');

        board.addEventListener('mousedown', startAction);
        window.addEventListener('mouseup', stopAction);

        board.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startAction();
        }, { passive: false });
        window.addEventListener('touchend', stopAction);
    </script>
</body>
</html>
