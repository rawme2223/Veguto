<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="icon" type="image/png" href="icon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاعل القطة</title>

    <meta property="og:title" content="تفاعل القطة">
    <meta property="og:description" content="اضغط على القطة وشاهد العداد!">
    <meta property="og:image" content="meow.png">
    <meta property="og:image:width" content="300">
    <meta property="og:image:height" content="300">
    <meta property="og:type" content="website">

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* العداد في الأعلى باللون الأحمر - رقم فقط */
        #score {
            font-size: 4rem;
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 10px;
            user-select: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .container {
            position: relative;
        }

        #clickable-img {
            width: 280px;
            cursor: pointer;
            transition: transform 0.1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }

        #clickable-img:active {
            transform: scale(0.85);
        }

        /* تأثير +1 المتطاير */
        .plus-one {
            position: absolute;
            color: #ff4757;
            font-size: 26px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.7s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }
    </style>
</head>
<body>

    <span id="score">0</span>

    <div class="container" id="game-container">
        <img src="meow.png" alt="Meow" id="clickable-img">
        <audio id="meow-sound" src="meow.mp3"></audio>
    </div>

    <script>
        const img = document.getElementById('clickable-img');
        const sound = document.getElementById('meow-sound');
        const container = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score');

        // نظام الحفظ التلقائي باستخدام Local Storage
        let score = parseInt(localStorage.getItem('cat_clicks')) || 0;
        scoreDisplay.innerText = score;

        img.addEventListener('click', (e) => {
            // تشغيل الصوت فوراً عند كل ضغطة
            sound.currentTime = 0;
            sound.play();

            // زيادة العداد وتحديث الشاشة والحفظ
            score++;
            scoreDisplay.innerText = score;
            localStorage.setItem('cat_clicks', score);

            // إنشاء تأثير +1 عند موقع النقر بالضبط
            const plusOne = document.createElement('div');
            plusOne.innerText = '+1';
            plusOne.className = 'plus-one';

            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            plusOne.style.left = `${x}px`;
            plusOne.style.top = `${y}px`;

            container.appendChild(plusOne);

            // إزالة عنصر التأثير بعد انتهاء الأنميشن
            setTimeout(() => {
                plusOne.remove();
            }, 700);
        });
    </script>

</body>
</html>
