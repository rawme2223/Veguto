<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="pageTitle">Games — Veguto</title>
<meta name="description" content="Little guides for every kitten game." />
<link rel="icon" type="image/x-icon" href="/assets/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: hsl(0 0% 96%);
    --fg: hsl(0 0% 45%);
    --card: #fff;
    --primary: hsl(0 78% 75%);
    --primary-fg: #fff;
    --muted-fg: hsl(0 0% 60%);
    --border: hsl(214 32% 91%);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Quicksand', sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
  }
  h1, h2, h3 { font-family: 'Dancing Script', cursive; font-weight: 600; margin: 0; color: var(--fg); }
  a { color: inherit; text-decoration: none; }

  header.site {
    display: flex; justify-content: space-between; align-items: center;
    padding: 15px 32px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 12px; transition: opacity 0.2s; }
  .brand:hover { opacity: 0.8; }
    .brand img { 
    width: auto;    
    height: 40px;     
    border-radius: 0; 
    object-fit: contain; 
  }
  .brand .logo { font-family: 'Dancing Script', cursive; font-size: 28px; color: var(--primary); }
  
  header.site nav a { margin-left: 24px; font-weight: 500; }
  header.site nav a:hover { color: var(--primary); }

  .hero { text-align: center; padding: 48px 16px; }
  .hero h1 { font-size: 56px; }

  .divider { display: flex; align-items: center; gap: 16px; margin: 48px auto; max-width: 900px; padding: 0 16px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-family: 'Dancing Script', cursive; font-size: 30px; color: var(--fg); padding: 0 24px; }

  main { max-width: 960px; margin: 0 auto; padding: 0 16px 64px; }

  /* تعديل هنا لإزالة الإطار والخلفية البيضاء للصورة تماماً */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: center; }
  .grid img { 
    width: 100%; 
    height: auto; 
    border-radius: 12px; 
    border: none !important; /* إزالة أي إطار إجباري */
    box-shadow: none !important; /* إزالة أي ظلال */
    display: block; 
    background: transparent !important; /* جعل الخلفية شفافة */
  }
  
  .game h2 { font-size: 36px; margin-bottom: 4px; }

  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 32px; }
  .columns h3 { font-size: 24px; margin-bottom: 12px; }

  .dynamic-list { font-size: 14px; }
  .dynamic-list div { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
  .pink-num { color: var(--primary); font-weight: 700; }
  .flower-icon { color: var(--primary); }

  .note {
    margin-top: 16px; border-left: 4px solid var(--primary);
    background: hsl(0 78% 75% / 0.1); padding: 12px 16px;
    border-radius: 0 8px 8px 0; font-size: 14px;
    display: none;
  }
  .note strong { color: var(--primary); font-weight: 600; }

  .cta { text-align: center; margin-top: 48px; }
  .pill {
    display: inline-block; background: var(--primary); color: var(--primary-fg);
    padding: 12px 32px; border-radius: 999px; font-weight: 600; font-size: 16px;
    transition: transform .2s, opacity .2s;
  }
  .pill:hover { opacity: 0.9; transform: scale(1.05); }

  #loading { text-align: center; padding: 100px; font-size: 20px; color: var(--muted-fg); }

  .hidden-section { display: none !important; }

  @media (max-width: 720px) {
    .grid, .columns { grid-template-columns: 1fr; }
    .hero h1 { font-size: 42px; }
  }
</style>
</head>
<body>
  <header class="site">
    <a href="https://veguto.rawme.online/" class="brand">
        <img src="/assets/header.png" alt="Veguto Icon">
        <div class="logo">Veguto</div>
    </a>
    <nav>
      <a href="https://veguto.rawme.online/">Home</a>
      <a href="https://veguto.rawme.online/#apps">Games</a>
    </nav>
  </header>

  <div id="gameContent" style="display: none;">
    <section class="hero">
      <h1 id="mainTitle">Loading...</h1>
    </section>

    <div id="howToPlayDivider" class="divider"><span>How to Play</span></div>

    <main>
      <article class="game">
        <div class="grid">
          <div id="bannerContainer"><img id="gameBanner" src="" alt="Game Banner" /></div>
          <div>
            <h2 id="aboutTitle">Title</h2>
            <p id="aboutText">Description...</p>
          </div>
        </div>

        <div class="columns">
          <div id="howToPlaySection">
            <h3>How to play</h3>
            <div id="howToPlayArea" class="dynamic-list"></div>
          </div>
          
          <div id="tipsSection">
            <h3 id="tipsTitle">Tips</h3>
            <div id="tipsArea" class="dynamic-list"></div>
            <div id="noteArea" class="note"></div>
          </div>
        </div>

        <div class="cta"><a id="playBtn" href="#" class="pill">Play Now</a></div>
      </article>
    </main>
  </div>

  <div id="loading">Loading kitten magic... ✨</div>

  <footer style="text-align: center; padding: 40px 20px; color: var(--muted-fg);">© 2024 Veguto.</footer>

  <script>
    function formatGameText(text, isHowToPlay = false) {
      if (!text || text.trim() === "") return "";
      let lines = text.split('<>');
      return lines.map(line => {
        let processedLine = line.trim();
        if (!processedLine) return "";
        if (isHowToPlay) {
          processedLine = processedLine.replace(/<\.(\d+)\.\.>/g, '<span class="pink-num">$1.</span> ');
        } else {
          if (!processedLine.startsWith('🌸')) {
            processedLine = `<span class="flower-icon">🌸</span> ` + processedLine;
          }
        }
        return `<div>${processedLine}</div>`;
      }).join('');
    }

    async function loadGameDetails() {
      const pathName = window.location.pathname;
      const pathParts = pathName.split('/');
      let gameFolder = pathParts[2]; 

      if (!gameFolder || gameFolder === 'assets' || gameFolder === 'games') {
          const urlParams = new URLSearchParams(window.location.search);
          gameFolder = urlParams.get('game');
      }

      if (!gameFolder) {
          document.getElementById('loading').innerText = "Please select a game first! 🐾";
          return;
      }

      try {
        const response = await fetch('https://veguto.rawme.online/games/data.json');
        const games = await response.json();
        const game = games.find(g => g.folderName === gameFolder);

        if (game) {
          document.getElementById('pageTitle').innerText = `${game.title} — Veguto`;
          document.getElementById('mainTitle').innerText = game.title;
          
          const bannerImg = document.getElementById('gameBanner');
          bannerImg.src = `https://veguto.rawme.online/games/${game.folderName}/banner.png`;
          bannerImg.onerror = () => { document.getElementById('bannerContainer').classList.add('hidden-section'); };

          document.getElementById('aboutTitle').innerText = game.title;
          document.getElementById('aboutText').innerText = game.aboutgame || game.description;
          
          const howToContent = formatGameText(game["How to play"], true);
          if (!howToContent) {
              document.getElementById('howToPlaySection').classList.add('hidden-section');
              document.getElementById('howToPlayDivider').classList.add('hidden-section');
          } else {
              document.getElementById('howToPlayArea').innerHTML = howToContent;
              document.getElementById('howToPlaySection').classList.remove('hidden-section');
              document.getElementById('howToPlayDivider').classList.remove('hidden-section');
          }

          const tipsContent = formatGameText(game["Tips"], false);
          const tipsTitle = document.getElementById('tipsTitle');
          const tipsArea = document.getElementById('tipsArea');
          
          if (!tipsContent) {
              tipsTitle.style.display = 'none';
              tipsArea.innerHTML = "";
          } else {
              tipsTitle.style.display = 'block';
              tipsArea.innerHTML = tipsContent;
          }
          
          const noteArea = document.getElementById('noteArea');
          if(game.Note && game.Note.trim() !== "") {
            noteArea.innerHTML = `<strong>Note:</strong> ${game.Note}`;
            noteArea.style.display = 'block';
          } else {
            noteArea.style.display = 'none';
          }

          if (!tipsContent && (!game.Note || game.Note.trim() === "")) {
              document.getElementById('tipsSection').classList.add('hidden-section');
          } else {
              document.getElementById('tipsSection').classList.remove('hidden-section');
          }

          document.getElementById('playBtn').href = `https://veguto.rawme.online/games/${game.folderName}/`;
          document.getElementById('playBtn').innerText = `Play ${game.title}`;

          document.getElementById('gameContent').style.display = 'block';
          document.getElementById('loading').style.display = 'none';
        } else {
          document.getElementById('loading').innerText = "Game not found! 🐱";
        }
      } catch (e) {
        document.getElementById('loading').innerText = "Error loading data.";
      }
    }

    window.onload = loadGameDetails;
  </script>
</body>
</html>
