<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="pageTitle">Games — Veguto</title>
<meta name="description" content="Little guides for every kitten game." />
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: hsl(0 0% 96%);
    --fg: hsl(0 0% 45%);
    --card: #fff;
    --primary: hsl(0 78% 75%);
    --primary-fg: #fff;
    --muted-fg: hsl(0 0% 60%);
    --border: hsl(214 32% 91%);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Quicksand', sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
  }
  h1, h2, h3 { font-family: 'Dancing Script', cursive; font-weight: 600; margin: 0; color: var(--fg); }
  a { color: inherit; text-decoration: none; }

  header.site {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 32px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  header.site .logo { font-family: 'Dancing Script', cursive; font-size: 32px; color: var(--primary); }
  header.site nav a { margin-left: 24px; font-weight: 500; }
  header.site nav a:hover { color: var(--primary); }

  .hero { text-align: center; padding: 48px 16px; }
  .hero h1 { font-size: 56px; }

  .divider { display: flex; align-items: center; gap: 16px; margin: 48px auto; max-width: 900px; padding: 0 16px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-family: 'Dancing Script', cursive; font-size: 30px; color: var(--fg); padding: 0 24px; }

  main { max-width: 960px; margin: 0 auto; padding: 0 16px 64px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: center; }
  .grid img { width: 100%; height: auto; border-radius: 12px; border: 1px solid var(--border); display: block; background: #fff;}
  .game h2 { font-size: 36px; margin-bottom: 4px; }

  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 32px; }
  .columns h3 { font-size: 24px; margin-bottom: 12px; }

  .dynamic-list { font-size: 14px; }
  .dynamic-list div { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
  .pink-num { color: var(--primary); font-weight: 700; }
  .flower-icon { color: var(--primary); }

  .note {
    margin-top: 16px; border-left: 4px solid var(--primary);
    background: hsl(0 78% 75% / 0.1); padding: 12px 16px;
    border-radius: 0 8px 8px 0; font-size: 14px;
    display: none;
  }
  .note strong { color: var(--primary); font-weight: 600; }

  .cta { text-align: center; margin-top: 48px; }
  .pill {
    display: inline-block; background: var(--primary); color: var(--primary-fg);
    padding: 12px 32px; border-radius: 999px; font-weight: 600; font-size: 16px;
    transition: transform .2s, opacity .2s;
  }
  .pill:hover { opacity: 0.9; transform: scale(1.05); }

  #loading { text-align: center; padding: 100px; font-size: 20px; color: var(--muted-fg); }

  @media (max-width: 720px) {
    .grid, .columns { grid-template-columns: 1fr; }
    .hero h1 { font-size: 42px; }
  }
</style>
</head>
<body>
  <header class="site">
    <div class="logo">Veguto</div>
    <nav>
      <a href="/">Home</a>
      <a href="/#apps">Games</a>
    </nav>
  </header>

  <div id="gameContent" style="display: none;">
    <section class="hero">
      <h1 id="mainTitle">Loading...</h1>
    </section>

    <div class="divider"><span>How to Play</span></div>

    <main>
      <article class="game">
        <div class="grid">
          <div><img id="gameImg" src="" alt="Game Icon" /></div>
          <div>
            <h2 id="aboutTitle">Title</h2>
            <p id="aboutText">Description...</p>
          </div>
        </div>

        <div class="columns">
          <div>
            <h3>How to play</h3>
            <div id="howToPlayArea" class="dynamic-list"></div>
          </div>
          <div>
            <h3>Tips</h3>
            <div id="tipsArea" class="dynamic-list"></div>
            <div id="noteArea" class="note"></div>
          </div>
        </div>

        <div class="cta"><a id="playBtn" href="#" class="pill">Play Now</a></div>
      </article>
    </main>
  </div>

  <div id="loading">Loading kitten magic... ✨</div>

  <footer style="text-align: center; padding: 20px; color: var(--muted-fg);">© 2024 Veguto.</footer>

  <script>
    function formatGameText(text, isHowToPlay = false) {
      if (!text) return "";
      let lines = text.split('<>');
      return lines.map(line => {
        let processedLine = line;
        if (isHowToPlay) {
          processedLine = processedLine.replace(/<\.(\d+)\.\.>/g, '<span class="pink-num">$1.</span> ');
        } else {
          if (!processedLine.trim().startsWith('🌸')) {
            processedLine = `<span class="flower-icon">🌸</span> ` + processedLine;
          }
        }
        return `<div>${processedLine}</div>`;
      }).join('');
    }

    async function loadGameDetails() {
      // 1. استخراج اسم اللعبة من المسار الجديد (games/namegame/about)
      const pathName = window.location.pathname;
      const pathParts = pathName.split('/');
      let gameFolder = pathParts[2]; // الجزء الذي يحتوي على اسم اللعبة

      // 2. التحقق الاحتياطي من الـ URL Parameter (?game=)
      if (!gameFolder || gameFolder === 'assets' || gameFolder === 'games') {
          const urlParams = new URLSearchParams(window.location.search);
          gameFolder = urlParams.get('game');
      }

      if (!gameFolder) {
          document.getElementById('loading').innerText = "Please select a game first! 🐾";
          return;
      }

      try {
        // استخدام رابط مطلق لملف JSON لضمان التحميل من أي مسار
        const response = await fetch('https://veguto.rawme.online/games/data.json');
        if (!response.ok) throw new Error("JSON not found");
        
        const games = await response.json();
        const game = games.find(g => g.folderName === gameFolder);

        if (game) {
          document.getElementById('pageTitle').innerText = `${game.title} — Veguto`;
          document.getElementById('mainTitle').innerText = game.title;
          
          // استخدام روابط مطلقة للصور والروابط
          document.getElementById('gameImg').src = `https://veguto.rawme.online/games/${game.image}`;
          document.getElementById('aboutTitle').innerText = game.title;
          document.getElementById('aboutText').innerText = game.aboutgame || game.description;
          
          document.getElementById('howToPlayArea').innerHTML = formatGameText(game["How to play"] || "", true);
          document.getElementById('tipsArea').innerHTML = formatGameText(game["Tips"] || "", false);
          
          if(game.Note) {
            document.getElementById('noteArea').innerHTML = `<strong>Note:</strong> ${game.Note}`;
            document.getElementById('noteArea').style.display = 'block';
          }

          document.getElementById('playBtn').href = `https://veguto.rawme.online/games/${game.folderName}/`;
          document.getElementById('playBtn').innerText = `Play ${game.title}`;

          document.getElementById('gameContent').style.display = 'block';
          document.getElementById('loading').style.display = 'none';
        } else {
          document.getElementById('loading').innerText = "Game not found! 🐱";
        }
      } catch (e) {
        console.error(e);
        document.getElementById('loading').innerText = "Error loading data. Make sure data.json is accessible.";
      }
    }

    window.onload = loadGameDetails;
  </script>
</body>
</html>
